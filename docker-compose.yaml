services:
  web:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: flask_app
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - ./templates:/templates
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: