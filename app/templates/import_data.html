<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Импорт данных — Digital Library</title>
    <style>
        body { background-color: #f9f9f9; }
        #drop-zone {
            border: 2px dashed #6c757d;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        #drop-zone.dragover { border-color: #0d6efd; background: #e8f0fe; }
        #drop-zone.file-selected { border-color: #198754; background: #e8f5e9; }
    </style>
</head>
<body class="p-4">
    <header class="bg-dark py-2 rounded mb-4">
        <div class="container-fluid d-flex gap-2">
            <a href="/" class="btn btn-outline-light btn-sm">На главную</a>
        </div>
    </header>

    <div class="container" style="max-width: 600px;">
        <h2 class="mb-1">Импорт данных</h2>
        <p class="text-muted mb-4">
            Загрузите JSON-файл, экспортированный через <code>/serialize</code>.
            Закладки, заметки, оценки, прогресс чтения и история поиска будут перенесены в ваш аккаунт.
            Дубликаты и записи к несуществующим книгам пропускаются.
        </p>

        <div id="drop-zone" onclick="document.getElementById('json-file').click()">
            <div style="font-size: 40px;">📂</div>
            <p class="mb-0 mt-2 text-muted" id="drop-label">Перетащите JSON-файл сюда или нажмите для выбора</p>
        </div>
        <input type="file" id="json-file" accept=".json" class="d-none">

        <div class="mt-3 d-flex gap-2">
            <button id="import-btn" class="btn btn-primary" disabled>Импортировать</button>
            <button id="clear-btn" class="btn btn-outline-secondary d-none">Очистить</button>
        </div>

        <div id="result" class="mt-4 d-none"></div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('json-file');
        const importBtn = document.getElementById('import-btn');
        const clearBtn = document.getElementById('clear-btn');
        const dropLabel = document.getElementById('drop-label');
        const resultDiv = document.getElementById('result');

        let selectedFile = null;

        function setFile(file) {
            if (!file || !file.name.endsWith('.json')) {
                showAlert('danger', 'Выберите файл с расширением .json');
                return;
            }
            selectedFile = file;
            dropLabel.textContent = `Выбран файл: ${file.name} (${(file.size / 1024).toFixed(1)} КБ)`;
            dropZone.classList.add('file-selected');
            importBtn.disabled = false;
            clearBtn.classList.remove('d-none');
            resultDiv.classList.add('d-none');
        }

        function clearFile() {
            selectedFile = null;
            fileInput.value = '';
            dropLabel.textContent = 'Перетащите JSON-файл сюда или нажмите для выбора';
            dropZone.classList.remove('file-selected', 'dragover');
            importBtn.disabled = true;
            clearBtn.classList.add('d-none');
            resultDiv.classList.add('d-none');
        }

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) setFile(fileInput.files[0]);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
        });

        clearBtn.addEventListener('click', clearFile);

        importBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            importBtn.disabled = true;
            importBtn.textContent = 'Импортируем…';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const resp = await fetch('/deserialize', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData,
                });
                const data = await resp.json();

                if (!resp.ok || !data.success) {
                    showAlert('danger', data.error || 'Произошла ошибка при импорте');
                    return;
                }

                showImportStats(data.imported);
            } catch (e) {
                showAlert('danger', 'Сетевая ошибка: ' + e.message);
            } finally {
                importBtn.disabled = false;
                importBtn.textContent = 'Импортировать';
            }
        });

        function showAlert(type, text) {
            resultDiv.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
            resultDiv.classList.remove('d-none');
        }

        function showImportStats(stats) {
            const labels = {
                favorites: 'Избранное',
                bookmarks: 'Закладки',
                notes: 'Заметки',
                ratings: 'Оценки',
                reading_progress: 'Прогресс чтения',
                search_history: 'История поиска',
                friendships: 'Запросы дружбы',
                achievements: 'Новые достижения',
            };

            const rows = Object.entries(stats).map(([key, val]) => `
                <tr>
                    <td>${labels[key] || key}</td>
                    <td class="text-success fw-bold">${val.imported}</td>
                    <td class="text-muted">${val.skipped}</td>
                </tr>
            `).join('');

            resultDiv.innerHTML = `
                <div class="alert alert-success">Импорт завершён успешно!</div>
                <table class="table table-sm table-bordered">
                    <thead class="table-light">
                        <tr><th>Раздел</th><th>Импортировано</th><th>Пропущено</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                <a href="/" class="btn btn-primary btn-sm">На главную</a>
            `;
            resultDiv.classList.remove('d-none');
        }
    </script>
</body>
</html>
