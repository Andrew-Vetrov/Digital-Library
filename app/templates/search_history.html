<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>История поиска</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles/app.css">
</head>
<body class="p-4">

<header class="app-header">
    <div class="container-fluid d-flex flex-wrap align-items-center gap-2">
        <a href="/" class="brand">📚 Digital Library</a>
        <div class="nav-actions ms-auto">
            <a href="/files" class="btn btn-light btn-sm">📚 Все файлы</a>
            <a href="/" class="btn btn-outline-light btn-sm">← На главную</a>
        </div>
    </div>
</header>

<div class="container mt-4">
    <h2 class="page-title text-center">🔍 История поиска</h2>

    {% if history %}
        <ul class="list-group">
            {% for item in history %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>{{ item.query }}</span>
                    <small class="text-muted">
                        {{ item.created_at.strftime("%d.%m.%Y %H:%M") }}
                    </small>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="text-center text-muted">История поиска пуста.</p>
    {% endif %}

    <div class="mt-4 text-center">
        <a href="/files" class="btn btn-secondary">Назад к библиотеке</a>
    </div>
</div>

</body>
</html>
