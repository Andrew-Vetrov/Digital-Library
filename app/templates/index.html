<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
    body {
      background-color: #f9f9f9;
    }
    .book-card {
      transition: all 0.3s ease;
      border-radius: 12px;
    }
    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
    }
    .book-cover {
      height: 220px;
      width: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin: 0 auto;
      display: block;
    }
  </style>
    <title>Digital library</title>
</head>

<body>
    <header class="bg-dark">
        <div class="container-fluid d-flex">
            {% if authorized == 0 %}
            <div class="buttons ms-auto">
                <a href="/authorization" class="btn btn-success">Вход</a>
                <a href="/registration" class="btn btn-success">Регистрация</a>
            </div>
            {% else %}
            <div class="buttons ms-auto">
                <div class="badge bg-warning text-wrap" style="width: 6rem; height: 48px;font-size: 12px;">
                    Пользователь: {{username}}
                </div>
                <a href="/sign_out" class="btn btn-success">Выход</a>
                <a href="/upload_file" class="btn btn-success">Загрузить файл</a>
            </div>
            {% endif %}
            <a href="/files" class="btn btn-success">Посмотреть все файлы</a>

        </div>
    </header>
    {% if favorites %}
<h3 class="mt-4">⭐ Любимые книги</h3>
<div class="row">
    {% for book in favorites %}
        <div class="col-md-3 mb-4">
            <div class="card p-2 text-center book-card">
                <img src="/cover/{{ book.id }}" class="book-cover" alt="">
                <h6 class="mt-2">{{ book.title }}</h6>
                <p class="text-muted" style="font-size: 12px;">{{ book.author }}</p>

                <a href="/reader/{{ book.id }}" class="btn btn-primary btn-sm">Читать</a>

                <form action="/unfavorite/{{ book.id }}" method="POST">
                    <button class="btn btn-warning btn-sm mt-1">Убрать</button>
                </form>
            </div>
        </div>
    {% endfor %}
</div>
{% endif %}
    <footer></footer>
</body>

</html>
