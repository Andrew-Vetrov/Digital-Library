<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="./static/styles/style.css">
    <title>Digital library</title>
</head>

<body>

    <header class="bg-dark">
        <div class="container-fluid d-flex">
                <a href="/" class="btn btn-primary" >На главную</a>
        </div>
    </header>

    <div class="container mt-4">
        <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
            <!-- Форма загрузки файла -->
            <form action="/upload_file" method="POST" enctype="multipart/form-data" id="uploadForm" class="mb-0">
                <div class="mb-0">
                    <label for="file" class="btn btn-warning">
                        <i class="bi bi-cloud-upload"></i> Загрузить файлы
                    </label>
                    <input type="file" class="form-control d-none" id="file" name="file" 
                           multiple onchange="submitForm()">
                </div>
            </form>

            <!-- Кнопка "Посмотреть все файлы" -->
            <a href="/files" class="btn btn-success">
                <i class="bi bi-folder"></i> Посмотреть все файлы
            </a>
        </div>

        {% if message %}
            <div class="alert alert-success mt-3" role="alert">
                {{ message }}
            </div>
        {% endif %}
    </div>

    <script>
    function submitForm() {
        document.getElementById('uploadForm').submit();
    }
    </script>

</body>

</html>
