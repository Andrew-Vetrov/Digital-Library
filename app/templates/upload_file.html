<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="./static/styles/style.css">
    <title>Digital library</title>
</head>

<body>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
        <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-text"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <header class="bg-dark">
        <div class="container-fluid d-flex p-2">
            <a href="/" class="btn btn-primary">На главную</a>
        </div>
    </header>

    <div class="container mt-4">
        <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
            <form action="/upload_file" method="POST" enctype="multipart/form-data" id="uploadForm" class="mb-0">
                <div class="mb-3">
                    <label for="file" class="form-label">Выберите EPUB-файлы</label>
                    <input type="file" class="form-control" id="file" name="file" accept=".epub" multiple required>
                </div>
                <button type="submit" id="uploadBtn" class="btn btn-warning">
                    Загрузить
                </button>
            </form>

            <a href="/files" class="btn btn-success">
                <i class="bi bi-folder"></i> Посмотреть все файлы
            </a>
        </div>

        {% if message %}
            <div class="alert alert-success mt-3" role="alert">
                {{ message }}
            </div>
        {% endif %}

        <div id="progressBlock" class="mb-4" style="display: none;">
            <div class="progress mb-2">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
                     style="width: 0%">0%</div>
            </div>
            <p id="progressText" class="text-muted small">Загружено 0 из 0 книг</p>
        </div>

        <div id="messageArea" class="alert-area"></div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressBlock = document.getElementById('progressBlock');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const messageArea = document.getElementById('messageArea');

        function showToast(message, type = 'success') {
            const toastElement = document.getElementById('liveToast');
            const toastText = document.getElementById('toast-text');
            if (!toastElement || !toastText) return;
            toastElement.className = `toast align-items-center text-white bg-${type} border-0`;
            toastText.innerText = message;
            new bootstrap.Toast(toastElement).show();
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            uploadBtn.disabled = true;
            messageArea.innerHTML = '';

            progressBlock.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
            progressText.textContent = 'Подготовка...';

            const formData = new FormData(uploadForm);

            try {
                const response = await fetch('/upload_file', {
                    method: 'POST',
                    body: formData
                });

                if (response.status === 403 || response.redirected) {
                    let errorMsg = "Вам запрещено загружать файлы настройками группы";
                    try {
                        const data = await response.clone().json();
                        if (data.error) errorMsg = data.error;
                    } catch(jsonErr) {}

                    showToast(errorMsg, "danger");
                    progressBlock.style.display = 'none';
                    return;
                }

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Ошибка сервера: ${response.status} ${errorText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.trim() === '') continue;
                        try {
                            const data = JSON.parse(line);
                            handleStreamMessage(data);
                        } catch (err) {
                            console.error('Ошибка парсинга JSON:', err, line);
                        }
                    }
                }
            } catch (error) {
                console.error(error);
                showMessage('danger', `Ошибка при загрузке: ${error.message}`);
                progressBlock.style.display = 'none';
            } finally {
                uploadBtn.disabled = false;
            }
        });

        function handleStreamMessage(data) {
            switch (data.type) {
                case 'start':
                    progressText.textContent = `Загружено 0 из ${data.total} книг`;
                    progressBar.style.width = '0%';
                    progressBar.textContent = '0%';
                    break;

                case 'progress':
                    const percent = Math.round((data.current / data.total) * 100);
                    progressBar.style.width = `${percent}%`;
                    progressBar.textContent = `${percent}%`;
                    progressText.textContent = `Загружено ${data.current} из ${data.total} книг`;
                    if (data.status === 'success') {
                        showMessage('success', data.message, true);
                    } else {
                        showMessage('danger', data.message, true);
                    }
                    break;

                case 'complete':
                    progressBlock.style.display = 'none';
                    if (data.success_count > 0) {
                        showMessage('success', `✅ Успешно загружено ${data.success_count} книг.`);
                    }
                    if (data.error_count > 0) {
                        showMessage('warning', `⚠️ Не удалось загрузить ${data.error_count} книг.`);
                        data.errors.forEach(err => {
                            showMessage('secondary', err, true);
                        });
                    }
                    uploadForm.reset();
                    break;

                default:
                    console.warn('Неизвестный тип сообщения:', data);
            }
        }

        function showMessage(type, message, isAppend = false) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.role = 'alert';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            if (isAppend) {
                messageArea.appendChild(alertDiv);
            } else {
                messageArea.innerHTML = '';
                messageArea.appendChild(alertDiv);
            }
            alertDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
            crossorigin="anonymous"></script>

</body>
</html>
