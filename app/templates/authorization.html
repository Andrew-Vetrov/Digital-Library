<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/styles/app.css">
    <title>Вход — Digital Library</title>
</head>
<body class="p-4">
    <header class="app-header">
        <div class="container-fluid d-flex flex-wrap align-items-center gap-2">
            <a href="/" class="brand">📚 Digital Library</a>
            <a href="/" class="btn btn-outline-light btn-sm ms-auto">← На главную</a>
        </div>
    </header>

    <main>
        <div class="auth-wrap">
            <form action="/authorization" method="POST" class="auth-card">
                <h2 class="text-center mb-4">Вход</h2>

                {% if result_of_authorization == 1 %}
                <div class="alert alert-success py-2 text-center">Вход выполнен успешно</div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label" for="email">Email адрес</label>
                    <input type="email" class="form-control" name="email" id="email" placeholder="Введите email адрес">
                    {% if result_of_authorization == 3 %}
                    <div class="field-error">Неправильный email адрес</div>
                    {% endif %}
                </div>

                <div class="mb-4">
                    <label class="form-label" for="password">Пароль</label>
                    <input type="password" class="form-control" name="password" id="password" placeholder="Введите пароль">
                    {% if result_of_authorization == 2 %}
                    <div class="field-error">Неправильный пароль</div>
                    {% endif %}
                </div>

                <button type="submit" class="btn btn-success w-100">Войти</button>

                <p class="text-center text-muted mt-3 mb-0" style="font-size: 14px;">
                    Нет аккаунта? <a href="/registration">Зарегистрироваться</a>
                </p>
            </form>
        </div>
    </main>
</body>
</html>
